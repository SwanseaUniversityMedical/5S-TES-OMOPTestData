# PostgreSQL configuration tuned for bulk Synthea data loading
# Adjust shared_buffers / work_mem based on your host RAM.

# ── Memory ──────────────────────────────────────────────────────────────────
shared_buffers            = 2GB        # ~25% of RAM; increase on larger hosts
work_mem                  = 256MB      # per sort/hash; tune per query concurrency
maintenance_work_mem      = 1GB        # for COPY, CREATE INDEX
effective_cache_size      = 6GB        # hint to planner (~75% of RAM)

# ── WAL / Durability ─────────────────────────────────────────────────────────
# These settings trade strict durability for much faster bulk loads.
# After loading completes you can revert synchronous_commit to 'on'.
synchronous_commit        = off        # no wait for WAL flush (safe for bulk load)
wal_level                 = replica    # must be replica+ when max_wal_senders > 0
max_wal_senders           = 0          # disable replication slots (bulk-load only)
max_wal_size              = 4GB
checkpoint_completion_target = 0.9
checkpoint_timeout        = 15min

# ── Parallel query ───────────────────────────────────────────────────────────
max_parallel_workers_per_gather = 4
max_parallel_workers            = 8
parallel_leader_participation   = on

# ── Network ────────────────────────────────────────────────────────────────
listen_addresses          = '*'        # accept connections from other containers

# ── Extensions ───────────────────────────────────────────────────────────────
shared_preload_libraries  = 'pg_stat_statements'
pg_stat_statements.track  = all

# ── Misc ─────────────────────────────────────────────────────────────────────
max_connections           = 50
log_min_duration_statement = 5000      # log queries taking > 5s
log_line_prefix           = '%t [%p] %u@%d '
